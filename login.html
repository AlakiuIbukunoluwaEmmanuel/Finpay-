<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>FinPay | Login</title>

    <link rel="stylesheet" href="login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="background-shapes">

        <div class="shape one"></div>

        <div class="shape two"></div>

    </div>

    <div class="login-card">

        <!-- Logo -->

        <div class="logo">

            <img src="finpay images/finpay.png"
                alt="FinPay Logo">

        </div>

        <!-- Heading -->

        <h1>Welcome Back</h1>

        <p class="subtitle">

            Sign in to continue to your FinPay account.

        </p>

        <!-- Login Form -->

        <form id="loginForm">

            <!-- Email -->

            <div class="input-group">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

            </div>

            <!-- Password -->

            <div class="input-group">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <i
                    class="fa-solid fa-eye"
                    id="togglePassword"></i>

            </div>

            <button
                type="submit"
                class="login-btn">

                Sign In

            </button>

        </form>

        <!-- Divider -->

        <div class="divider">

            <span>or continue with</span>

        </div>

        <!-- Social Buttons -->

        <div class="social-buttons">

            <button
                type="button"
                class="google">

                <i class="fa-brands fa-google"></i>

                Google

            </button>

            <button
                type="button"
                class="facebook">

                <i class="fa-brands fa-facebook-f"></i>

                Facebook

            </button>

        </div>

        <!-- Sign Up Link -->

        <p class="auth-link">

            Don't have an account?

            <a href="signup.html">

                Create Account

            </a>

        </p>

    </div>

    <script src="login.js"></script>

</body>

</html>
